<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - AI Platform</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 8px;
      font-size: 28px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 32px;
      font-size: 14px;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #2c3e50;
      font-weight: 500;
      font-size: 14px;
    }
    
    input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    button {
      width: 100%;
      padding: 14px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #5568d3;
    }
    
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .success {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }
    
    .success.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 AI Platform</h1>
    <p class="subtitle">Your personal autonomous AI agent</p>
    
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Login</button>
      <button class="tab" onclick="showTab('register')">Register</button>
    </div>
    
    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    
    <!-- Login Form -->
    <form id="login-form" style="display: block;">
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="your@email.com" required />
      </div>
      
      <div class="form-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
      </div>
      
      <button type="submit" id="login-btn">Login</button>
    </form>
    
    <!-- Register Form -->
    <form id="register-form" style="display: none;">
      <div class="form-group">
        <label for="register-email">Email</label>
        <input type="email" id="register-email" placeholder="your@email.com" required />
      </div>
      
      <div class="form-group">
        <label for="register-password">Password</label>
        <input type="password" id="register-password" placeholder="••••••••" required />
      </div>
      
      <div class="form-group">
        <label for="register-password-confirm">Confirm Password</label>
        <input type="password" id="register-password-confirm" placeholder="••••••••" required />
      </div>
      
      <button type="submit" id="register-btn">Create Account</button>
    </form>
  </div>

  <script>
    const API_URL = window.location.origin;  // Same origin as the page
    
    function showTab(tab) {
      // Update tabs
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      // Update forms
      document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
      
      // Clear messages
      hideError();
      hideSuccess();
    }
    
    function showError(message) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = message;
      errorDiv.classList.add('show');
    }
    
    function hideError() {
      document.getElementById('error').classList.remove('show');
    }
    
    function showSuccess(message) {
      const successDiv = document.getElementById('success');
      successDiv.textContent = message;
      successDiv.classList.add('show');
    }
    
    function hideSuccess() {
      document.getElementById('success').classList.remove('show');
    }
    
    // Login form
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      hideSuccess();
      
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');
      
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      
      try {
        const formData = new FormData();
        formData.append('username', email);
        formData.append('password', password);
        
        const response = await fetch(`${API_URL}/auth/token`, {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Store token
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user_email', data.user_email);
          
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          showError(data.detail || 'Login failed');
        }
      } catch (error) {
        showError('Connection error. Make sure the server is running.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Login';
      }
    });
    
    // Register form
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      hideSuccess();
      
      const email = document.getElementById('register-email').value;
      const password = document.getElementById('register-password').value;
      const passwordConfirm = document.getElementById('register-password-confirm').value;
      const btn = document.getElementById('register-btn');
      
      if (password !== passwordConfirm) {
        showError('Passwords do not match');
        return;
      }
      
      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }
      
      btn.disabled = true;
      btn.textContent = 'Creating account...';
      
      try {
        const response = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Store token
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user_email', data.user_email);
          
          showSuccess('Account created! Redirecting...');
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1000);
        } else {
          showError(data.detail || 'Registration failed');
        }
      } catch (error) {
        showError('Connection error. Make sure the server is running.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
    
    // Check if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
