<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capabilities Browser</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 10px;
    }
    
    .back-link {
      color: #667eea;
      text-decoration: none;
      margin-bottom: 20px;
      display: inline-block;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .tab {
      padding: 12px 24px;
      background: white;
      border: none;
      border-radius: 8px 8px 0 0;
      cursor: pointer;
      font-weight: 600;
      color: #666;
      transition: all 0.2s;
    }
    
    .tab.active {
      background: white;
      color: #667eea;
      box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
    }
    
    .tab-content {
      display: none;
      background: white;
      border-radius: 0 12px 12px 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .tab-content.active {
      display: block;
    }
    
    .capability-card {
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .capability-name {
      font-size: 20px;
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    
    .capability-description {
      color: #666;
      margin-bottom: 12px;
    }
    
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .tag {
      padding: 4px 12px;
      background: #e3f2fd;
      color: #0b7285;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .schema {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      margin-top: 12px;
    }
    
    .gap-card {
      border: 1px solid #ffc107;
      background: #fff3cd;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .gap-tags {
      font-size: 18px;
      font-weight: 600;
      color: #856404;
      margin-bottom: 8px;
    }
    
    .gap-count {
      color: #666;
      font-size: 14px;
    }
    
    .plugin-card {
      border: 1px solid #28a745;
      background: #d4edda;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    
    .plugin-name {
      font-size: 18px;
      font-weight: 600;
      color: #155724;
      margin-bottom: 8px;
    }
    
    .plugin-description {
      color: #155724;
      margin-bottom: 8px;
    }
    
    .plugin-demand {
      font-size: 14px;
      color: #666;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back to Dashboard</a>
  <h1>🔧 Capabilities Browser</h1>
  
  <div class="tabs">
    <button class="tab active" onclick="showTab('capabilities')">Capabilities</button>
    <button class="tab" onclick="showTab('gaps')">Gaps</button>
    <button class="tab" onclick="showTab('plugins')">Plugins</button>
  </div>
  
  <div id="capabilities-tab" class="tab-content active">
    <h2 style="margin-bottom: 20px;">Registered Capabilities</h2>
    <div id="capabilities-list"></div>
  </div>
  
  <div id="gaps-tab" class="tab-content">
    <h2 style="margin-bottom: 20px;">Detected Capability Gaps</h2>
    <p style="color: #666; margin-bottom: 20px;">
      These are capabilities that users requested but the system doesn't have yet.
    </p>
    <div id="gaps-list"></div>
  </div>
  
  <div id="plugins-tab" class="tab-content">
    <h2 style="margin-bottom: 20px;">Proposed Plugins</h2>
    <p style="color: #666; margin-bottom: 20px;">
      Plugin specifications generated based on detected gaps.
    </p>
    <div id="plugins-list"></div>
  </div>

  <script>
    const API_URL = window.location.origin;  // Same origin as the page
    
    // Check authentication
    const token = localStorage.getItem('token');
    const userEmail = localStorage.getItem('user_email');
    
    if (!token) {
      window.location.href = 'login.html';
    }
    
    function showTab(tabName) {
      // Update tab buttons
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Update tab content
      document.querySelectorAll('.tab-content').forEach(content => {
        content.classList.remove('active');
      });
      document.getElementById(tabName + '-tab').classList.add('active');
    }
    
    async function loadCapabilities() {
      try {
        const res = await fetch(`${API_URL}/capabilities`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('user_email');
          window.location.href = 'login.html';
          return;
        }
        const capabilities = await res.json();
        
        const list = document.getElementById('capabilities-list');
        
        if (capabilities.length === 0) {
          list.innerHTML = '<div class="empty-state">No capabilities registered</div>';
          return;
        }
        
        list.innerHTML = capabilities.map(cap => `
          <div class="capability-card">
            <div class="capability-name">${cap.name}</div>
            <div class="capability-description">${cap.description}</div>
            <div class="tags">
              ${cap.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            ${Object.keys(cap.input_schema).length > 0 ? `
              <div class="schema">
                <strong>Input:</strong> ${JSON.stringify(cap.input_schema, null, 2)}
              </div>
            ` : ''}
            ${Object.keys(cap.output_schema).length > 0 ? `
              <div class="schema">
                <strong>Output:</strong> ${JSON.stringify(cap.output_schema, null, 2)}
              </div>
            ` : ''}
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('capabilities-list').innerHTML = 
          '<div class="empty-state">Error loading capabilities</div>';
      }
    }
    
    async function loadGaps() {
      try {
        const res = await fetch(`${API_URL}/gaps`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('user_email');
          window.location.href = 'login.html';
          return;
        }
        const gaps = await res.json();
        
        const list = document.getElementById('gaps-list');
        
        if (gaps.length === 0) {
          list.innerHTML = '<div class="empty-state">No capability gaps detected yet</div>';
          return;
        }
        
        list.innerHTML = gaps.map(gap => `
          <div class="gap-card">
            <div class="gap-tags">Missing: ${gap.missing_tags.join(', ')}</div>
            <div class="gap-count">Requested ${gap.count} time${gap.count > 1 ? 's' : ''}</div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('gaps-list').innerHTML = 
          '<div class="empty-state">Error loading gaps</div>';
      }
    }
    
    async function loadPlugins() {
      try {
        const res = await fetch(`${API_URL}/plugins`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('user_email');
          window.location.href = 'login.html';
          return;
        }
        const plugins = await res.json();
        
        const list = document.getElementById('plugins-list');
        
        if (plugins.length === 0) {
          list.innerHTML = '<div class="empty-state">No plugin proposals yet</div>';
          return;
        }
        
        list.innerHTML = plugins.map(plugin => `
          <div class="plugin-card">
            <div class="plugin-name">${plugin.name}</div>
            <div class="plugin-description">${plugin.description}</div>
            <div class="tags">
              ${plugin.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
            <div class="plugin-demand">Demand: ${plugin.count} request${plugin.count > 1 ? 's' : ''}</div>
          </div>
        `).join('');
      } catch (e) {
        document.getElementById('plugins-list').innerHTML = 
          '<div class="empty-state">Error loading plugins</div>';
      }
    }
    
    loadCapabilities();
    loadGaps();
    loadPlugins();
    
    setInterval(() => {
      loadCapabilities();
      loadGaps();
      loadPlugins();
    }, 5000);
  </script>
</body>
</html>
