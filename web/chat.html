<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My AI Platform – Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    
    h1 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 28px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    #log {
      padding: 20px;
      height: 500px;
      overflow-y: auto;
      background: #fafafa;
    }
    
    .msg-user {
      color: #0b7285;
      margin: 12px 0;
      padding: 10px 14px;
      background: #e3f2fd;
      border-radius: 8px;
      border-left: 3px solid #0b7285;
    }
    
    .msg-ai {
      color: #5c2d91;
      margin: 12px 0;
      padding: 10px 14px;
      background: #f3e5f5;
      border-radius: 8px;
      border-left: 3px solid #5c2d91;
    }
    
    .msg-error {
      color: #c62828;
      margin: 12px 0;
      padding: 10px 14px;
      background: #ffebee;
      border-radius: 8px;
      border-left: 3px solid #c62828;
    }
    
    .msg-system {
      color: #666;
      margin: 12px 0;
      padding: 8px 14px;
      background: #f5f5f5;
      border-radius: 8px;
      font-size: 13px;
      font-style: italic;
    }
    
    #input-row {
      padding: 20px;
      display: flex;
      gap: 10px;
      background: white;
      border-top: 1px solid #e0e0e0;
    }
    
    #message {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    
    #message:focus {
      outline: none;
      border-color: #0b7285;
    }
    
    #send {
      padding: 12px 24px;
      background: #0b7285;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    #send:hover {
      background: #0a5f6d;
    }
    
    #send:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    
    .status {
      padding: 10px 20px;
      background: #fff3cd;
      border-bottom: 1px solid #ffc107;
      font-size: 13px;
      color: #856404;
    }
    
    .status.connected {
      background: #d4edda;
      border-bottom-color: #28a745;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      border-bottom-color: #dc3545;
      color: #721c24;
    }
    
    .thinking {
      display: inline-block;
      margin-left: 8px;
    }
    
    .thinking::after {
      content: '...';
      animation: dots 1.5s steps(4, end) infinite;
    }
    
    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }
  </style>
</head>
<body>
  <h1>🤖 My AI Platform – Chat</h1>
  
  <div class="container">
    <div id="status" class="status">Connecting to server...</div>
    <div id="log"></div>
    <div id="input-row">
      <input id="message" type="text" placeholder="Type a message..." disabled />
      <button id="send" disabled>Send</button>
    </div>
  </div>

  <script>
    const log = document.getElementById('log');
    const input = document.getElementById('message');
    const sendBtn = document.getElementById('send');
    const statusBar = document.getElementById('status');
    const API_URL = window.location.origin;  // Same origin as the page
    
    let isProcessing = false;
    
    // Check authentication
    const token = localStorage.getItem('token');
    const userEmail = localStorage.getItem('user_email');
    
    if (!token) {
      window.location.href = 'login.html';
    }

    // Check server connection
    async function checkConnection() {
      try {
        const res = await fetch(`${API_URL}/health`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        
        if (res.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('user_email');
          window.location.href = 'login.html';
          return;
        }
        
        const data = await res.json();
        
        if (data.status === 'healthy') {
          statusBar.textContent = `✓ Connected | ${data.capabilities} capabilities | ${data.memory_items} memories`;
          statusBar.className = 'status connected';
          input.disabled = false;
          sendBtn.disabled = false;
          
          addMessage('System: Connected to AI Platform. Ready to chat!', 'msg-system');
        }
      } catch (e) {
        statusBar.textContent = '✗ Cannot connect to server. Make sure it\'s running on port 8000.';
        statusBar.className = 'status error';
        addMessage('Error: Cannot connect to server. Run: python app.py', 'msg-error');
      }
    }

    function addMessage(text, cls) {
      const div = document.createElement('div');
      div.className = cls;
      div.textContent = text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isProcessing) return;
      
      isProcessing = true;
      sendBtn.disabled = true;
      sendBtn.innerHTML = 'Thinking<span class="thinking"></span>';
      
      addMessage('You: ' + text, 'msg-user');
      input.value = '';

      try {
        const startTime = Date.now();
        
        const res = await fetch(`${API_URL}/chat`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ message: text })
        });
        
        if (res.status === 401) {
          localStorage.removeItem('token');
          localStorage.removeItem('user_email');
          window.location.href = 'login.html';
          return;
        }
        
        const data = await res.json();
        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        
        if (res.ok) {
          addMessage('AI: ' + data.reply, 'msg-ai');
          addMessage(`System: Response in ${elapsed}s (${data.reasoning_passes} reasoning passes)`, 'msg-system');
        } else {
          addMessage('Error: ' + (data.detail || 'Unknown error'), 'msg-error');
        }
      } catch (e) {
        addMessage('Error: ' + e.message, 'msg-error');
      } finally {
        isProcessing = false;
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
        input.focus();
      }
    }

    sendBtn.onclick = sendMessage;
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isProcessing) sendMessage();
    });

    // Check connection on load
    checkConnection();
  </script>
</body>
</html>
